<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asistente IA — {{ app_name|default("ClinicFlow") }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#F5F6F8;--surface:#FFFFFF;--ink:#10151F;--ink-2:#4B5563;--muted:#7C8696;--border:#ECEFF3;--primary:#2563EB;--radius:16px;}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
        a{text-decoration:none;color:inherit}
        .wrap{max-width:820px;margin:0 auto;padding:0 28px}
        header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
        .nav{height:66px;display:flex;align-items:center;gap:18px}
        .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:18px;letter-spacing:-.02em}
        .logo{width:34px;height:34px;border-radius:10px;background:var(--primary);position:relative;flex:none;box-shadow:0 4px 12px rgba(37,99,235,.32)}
        .logo::before,.logo::after{content:"";position:absolute;left:50%;top:50%;background:#fff;border-radius:2px;transform:translate(-50%,-50%)}
        .logo::before{width:14px;height:4.5px}.logo::after{width:4.5px;height:14px}
        .nav .spacer{margin-left:auto}
        .nav a.link{padding:8px 13px;border-radius:9px;font-size:14.5px;font-weight:600;color:var(--ink-2)}
        .nav a.link:hover{background:#F2F4F7;color:var(--ink)}
        main{padding:32px 0 64px}
        h1{font-size:clamp(24px,3.5vw,32px);font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
        .sub{color:var(--muted);font-size:15px;margin-bottom:24px}
        .chat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
            display:flex;flex-direction:column;height:62vh;min-height:420px;overflow:hidden}
        .mensajes{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:12px}
        .burbuja{max-width:78%;padding:11px 15px;border-radius:14px;font-size:14.5px;white-space:pre-wrap;line-height:1.5}
        .burbuja.bot{align-self:flex-start;background:#F2F4F7;color:var(--ink);border-bottom-left-radius:4px}
        .burbuja.yo{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px}
        .burbuja.cargando{color:var(--muted);font-style:italic}
        form{display:flex;gap:10px;padding:16px;border-top:1px solid var(--border);background:var(--surface)}
        input[type=text]{flex:1;padding:12px 14px;border:1px solid var(--border);border-radius:11px;
            font-family:inherit;font-size:14.5px;color:var(--ink);outline:none}
        input[type=text]:focus{border-color:var(--primary)}
        button{padding:12px 20px;border:none;border-radius:11px;background:var(--primary);color:#fff;
            font-family:inherit;font-weight:700;font-size:14.5px;cursor:pointer}
        button:disabled{opacity:.55;cursor:default}
    </style>
</head>
<body>
    <header>
        <div class="wrap nav">
            <a class="brand" href="/"><span class="logo"></span>{{ app_name|default("ClinicFlow") }}</a>
            <span class="spacer"></span>
            <a class="link" href="/mis-citas">Mis citas</a>
            <a class="link" href="/portal">Portal</a>
            <a class="link" href="/logout">Cerrar sesión</a>
        </div>
    </header>
    <main>
        <div class="wrap">
            <h1>Asistente IA</h1>
            <p class="sub">Escríbele en lenguaje natural: «agéndame cardiología el lunes a las 10», «cancela mi hora», «¿qué citas tengo?».</p>

            <div class="chat">
                <div class="mensajes" id="mensajes">
                    <div class="burbuja bot">Hola {{ usuario.nombre }}, soy tu asistente. ¿En qué te ayudo?</div>
                </div>
                <form id="form">
                    <input type="text" id="entrada" placeholder="Escribe tu mensaje…" autocomplete="off" required />
                    <button type="submit" id="enviar">Enviar</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const mensajes = document.getElementById("mensajes");
        const form = document.getElementById("form");
        const entrada = document.getElementById("entrada");
        const enviar = document.getElementById("enviar");

        function burbuja(texto, clase) {
            const div = document.createElement("div");
            div.className = "burbuja " + clase;
            div.textContent = texto;
            mensajes.appendChild(div);
            mensajes.scrollTop = mensajes.scrollHeight;
            return div;
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const texto = entrada.value.trim();
            if (!texto) return;

            burbuja(texto, "yo");
            entrada.value = "";
            enviar.disabled = true;
            const cargando = burbuja("Pensando…", "bot cargando");

            try {
                const resp = await fetch("/asistente/mensaje", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mensaje: texto }),
                });
                const data = await resp.json();
                cargando.remove();
                burbuja(data.respuesta || "No pude responder.", "bot");
            } catch (err) {
                cargando.remove();
                burbuja("Hubo un problema de conexión. Intenta de nuevo.", "bot");
            } finally {
                enviar.disabled = false;
                entrada.focus();
            }
        });
    </script>
</body>
</html>
